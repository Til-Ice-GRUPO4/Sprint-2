<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>

    <aside>
        <div class="aside-container-top">
            <div class="aside-logo-container">
                <img src="../../images/logo1.png" alt="Logo">
                <span>TIL-ICE</span>
            </div>
            <div class="aside-buttons-wrap">
                <div class="aside-button" onclick="window.location.href='../dashboard/dashboard.html'">

                <div class="aside-button" onclick="window.location.href='../funcionarios/register-employee1.html'">

                    <div class="aside-button-text">Cadastrar Funcionário</div>
                </div>
                <div class="aside-button current-session" ; onclick="window.location.href='../lotes/lot-register.html'">
                    <div class="aside-button-icon-container registro-de-lotes-btn"></div>
                    <div class="aside-button-text">Registro de Lotes</div>
                </div>
                <div class="aside-button" onclick="window.location.href='../funcionarios/see-employee.html'">

                </div>

        <div class="aside-container-bottom">

            </div>
        </div>
    </aside>

    <dialog class="modal modal-exit">
        <div class="container-modal-exit">
            <h1>Confirmar Saída</h1>
            <p>Tem certeza que deseja sair da seseão?</p>
            <div class="section-buttons">
                <button class="cancel-button close-modal-exit">Cancelar</button>
                <button class="exit-button" onclick="window.location.href='../../index.html'">Sair</button>
            </div>
        </div>
    </dialog>

    <main>
        <div class="container">
            <h1>Containers</h1>
            <!-- Criando tabela para exibir containeres. -->
            <div class="Centralizador">

                <table>
                    <tbody>
                        <tr>
                            <td>
                                <input type="checkbox" class="pointer" onchange="AtivarBotao()">
                            </td>
                            <td>
                                <div class="Container_info">
                                    Container com problema
                                </div>
                            </td>
                            <td>
                                <button onclick="Iniciar()" class="btn iniciar" style="display: flex;">Iniciar</button>
                                <button onclick="Finalizar()" class="btn finalizar"
                                    style="display: none;">Finalizar</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="checkbox" class="pointer" onchange="AtivarBotao()">
                            </td>
                            <td>
                                <div class="Container_info">
                                    Container Velho
                                </div>
                            </td>
                            <td>
                                <button onclick="Iniciar()" class="btn iniciar" style="display: flex;">Iniciar</button>
                                <button onclick="Finalizar()" class="btn finalizar"
                                    style="display: none;">Finalizar</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="checkbox" class="pointer" onchange="AtivarBotao()">
                            </td>
                            <td>
                                <div class="Container_info">
                                    Container A
                                </div>
                            </td>
                            <td>
                                <button onclick="Iniciar()" class="btn iniciar" style="display: flex;">Iniciar</button>
                                <button onclick="Finalizar()" class="btn finalizar"
                                    style="display: none;">Finalizar</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="checkbox" class="pointer" onchange="AtivarBotao()">
                            </td>
                            <td>
                                <div class="Container_info">
                                    Container B
                                </div>
                            </td>
                            <td>
                                <button onclick="Iniciar()" class="btn iniciar" style="display: flex;">Iniciar</button>
                                <button onclick="Finalizar()" class="btn finalizar"
                                    style="display: none;">Finalizar</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="checkbox" class="pointer" onchange="AtivarBotao()">
                            </td>
                            <td>
                                <div class="Container_info">
                                    Container C
                                </div>
                            </td>
                            <td>
                                <button onclick="Iniciar()" class="btn iniciar" style="display: flex;">Iniciar</button>
                                <button onclick="Finalizar()" class="btn finalizar"
                                    style="display: none;">Finalizar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="Centralizador">
                <div class="BtnOutside">
                    <button class="btn iniciar" onclick="Iniciar()" id="IniciarGeral"
                        style="display: flex;">Iniciar</button>
                    <button class="btn finalizar" onclick="Finalizar()" id="FinalizarGeral"
                        style="display: none;">Finalizar</button>
                </div>
            </div>
        </div>

    </main>
</body>

<script src="../../scripts/model_script.js"></script>

<script>
    // Fazer apenas com que o botao Iniciar DAQUELA linha não apareça ao clicar, e o botao Finalizar DAQUELA linha apareça, e vice versa Por Enquanto Desconsiderando as Checkboxes.
    let BotaoLinhaIniciar = document.querySelectorAll('.btn.iniciar');
    let BotaoLinhaFinalizar = document.querySelectorAll('.btn.finalizar');
    function Iniciar() {
        for (let i = 0; i < BotaoLinhaIniciar.length; i++) {
            // Verificando se o botao daquela linha foi clicado
            let botaoClicado = event.target;
            if (BotaoLinhaIniciar[i] === botaoClicado) {
                if (BotaoLinhaIniciar[i].style.display === 'flex') {
                    BotaoLinhaIniciar[i].style.display = 'none';
                    BotaoLinhaFinalizar[i].style.display = 'flex';
                }
                break;
            }
        }
    }

    function Finalizar() {
        for (let i = 0; i < BotaoLinhaFinalizar.length; i++) {
            // Verificando se o botao daquela linha foi clicado
            let botaoClicado = event.target;
            if (BotaoLinhaFinalizar[i] === botaoClicado) {
                if (BotaoLinhaFinalizar[i].style.display === 'flex') {
                    BotaoLinhaFinalizar[i].style.display = 'none';
                    BotaoLinhaIniciar[i].style.display = 'flex';
                }
                break;
            }
        }
    }
</script>

</html>

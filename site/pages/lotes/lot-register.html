                            <td>
                                <div class="Container_info">

                            </td>
                            <td>

                            </td>

                        <td>

                        <tr>
                            <td>

                            </td>
                            <td>
                                <div class="Container_info">
                                    Container A
                                </div>
                            </td>
                            <td>
                                <button onclick="Iniciar()" class="btn iniciar" style="display: flex;">Iniciar</button>
                                <button onclick="Finalizar()" class="btn finalizar"
                                    style="display: none;">Finalizar</button>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <input type="checkbox" class="pointer" onchange="AtivarBotao()">
                            </td>
                            <td>
                                <div class="Container_info">
                                    Container B
                                </div>
                            </td>
                            <td>

                                <button onclick="Finalizar()" class="btn finalizar"

<script src="../../scripts/model_script.js"></script>

<script>
    // Fazer apenas com que o botao Iniciar DAQUELA linha não apareça ao clicar, e o botao Finalizar DAQUELA linha apareça, e vice versa Por Enquanto Desconsiderando as Checkboxes.
    let BotaoLinhaIniciar = document.querySelectorAll('.btn.iniciar');
    let BotaoLinhaFinalizar = document.querySelectorAll('.btn.finalizar');

    let modalStart = document.querySelector(".modal-start");
    let closeModalStart = document.querySelector(".close-modal-start");
    let cancelModalStart = document.querySelector(".cancel-modal-start");

    let modalEnd = document.querySelector(".modal-end");
    let closeModalEnd = document.querySelector(".close-modal-end");
    let cancelModalEnd = document.querySelector(".cancel-modal-end");

    let linhaAtiva = null;

    function Iniciar() {
        for (let i = 0; i < BotaoLinhaIniciar.length; i++) {
            // Verificando se o botao daquela linha foi clicado
            let botaoClicado = event.target;
            if (BotaoLinhaIniciar[i] === botaoClicado) {
                linhaAtiva = i;

                if (BotaoLinhaIniciar[i].style.display === 'flex') {
                    BotaoLinhaIniciar[i].style.display = 'none';
                    BotaoLinhaFinalizar[i].style.display = 'flex';

                    modalStart.showModal();
                }
                break;
            }
        }
    }
    cancelModalStart.addEventListener("click", (e) => {
        if (linhaAtiva !== null) {
            BotaoLinhaIniciar[linhaAtiva].style.display = 'flex';
            BotaoLinhaFinalizar[linhaAtiva].style.display = 'none';
        }
        modalStart.close();
        linhaAtiva = null;
    });

    closeModalStart.addEventListener("click", (e) => {
        modalStart.close();
        linhaAtiva = null;
    });

    function Finalizar() {
        for (let i = 0; i < BotaoLinhaFinalizar.length; i++) {
            // Verificando se o botao daquela linha foi clicado
            let botaoClicado = event.target;
            if (BotaoLinhaFinalizar[i] === botaoClicado) {
                linhaAtiva = i;
                if (BotaoLinhaFinalizar[i].style.display === 'flex') {

                    BotaoLinhaFinalizar[i].style.display = 'none';
                    BotaoLinhaIniciar[i].style.display = 'flex';

                    modalEnd.showModal();
                }
                break;
            }
        }
    }

    cancelModalEnd.addEventListener("click", () => {
        if (linhaAtiva !== null) {
            BotaoLinhaFinalizar[linhaAtiva].style.display = 'flex';
            BotaoLinhaIniciar[linhaAtiva].style.display = 'none';
        }
        modalEnd.close();
        linhaAtiva = null;
    });

    closeModalEnd.addEventListener("click", () => {
        modalEnd.close();
        linhaAtiva = null;
    });

</script>

</html>

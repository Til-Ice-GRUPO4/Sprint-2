<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIL-ICE - Equipe</title>
    <link rel="stylesheet" href="/styles/main_style.css">
    <script src="/scripts/main_script.js"></script>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-title-box">
                <img src="/images/logo.png" alt="Logo" width="60px">
                <span class="header-title">TIL-ICE</span>
            </div>
            <div class="header-buttons-box">
                <ul>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="./equipe.html">Equipe</a></li>
                    <li><a href="./sobre.html">Sobre</a></li>
                    <li><a href="./localizacao.html">Localização</a></li>
                </ul>
                <div class="header-login-box">
                    <button class="button secondary-button" onclick="pageLogin()">Login</button>
                    <button class="button primary-button" onclick="pageCadastrar()">Cadastrar</button>
                </div>
            </div>
        </div>
    </header>
    <main class="equipe-main">
        <div class="main-container equipe-main-container">
            <div class="main-title">
                <h2>Equipe</h2>
            </div>
            <div class="main-grid">
                <div class="grid-cel">
                    <img src="/images/Anderson.png" alt="Member 1" class="grid-cel-image">
                    <span class="grid-cel-text">Anderson Oliveira</span>
                </div>
                <div class="grid-cel">
                    <img src="/images/Zanotti.jpg" alt="Member 2">
                    <span>Gabriel Zanotti</span>
                </div>
                <div class="grid-cel">
                    <img src="/images/Gus.jpg" alt="Member 3" class="grid-cel-image">
                    <span class="grid-cel-text">Gus Paulino</span>
                </div>
                <div class="grid-cel">
                    <img src="/images/Gustavo.jpg" alt="Member 4" class="grid-cel-image">
                    <span class="grid-cel-text">Gustavo Araujo</span>
                </div>
                <div class="grid-cel">
                    <img src="/images/Luiz.jpg" alt="Member 5" class="grid-cel-image">
                    <span class="grid-cel-text">Luiz Silva</span>
                </div>
                <div class="grid-cel">
                    <img src="/images/Marcus.jpg" alt="Member 6" class="grid-cel-image">
                    <span class="grid-cel-text">Marcus Lima</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

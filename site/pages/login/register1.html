<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/login_style.css">
    <script src="../../scripts/login_script.js"></script>
</head>

<body>
    <div class="background">
        <div class="login">
            <div class="login-top">
                <h3 class="title">CADASTRO</h3>
                <div class="progress-bar">
                    <div class="progress-element progress-element-complete progress-element-dados-iniciais">
                        <div class="progress-number">1</div>
                        <div class="progress-text">Dados iniciais</div>
                    </div>
                    <div class="progress-element">
                        <div class="progress-text">Identificação</div>
                        <div class="progress-number">2</div>
                    </div>
                </div>
            </div>

            <div class="campos-wrap">
                <div class="campo">
                    <label>E-MAIL</label>
                    <input type="email" id="ipt_email">
                </div>
                <div class="campo">
                    <label>SENHA</label>
                    <input type="password" id="ipt_senha">
                </div>
                <div class="campo">
                    <label>CONFIRMAR SENHA</label>
                    <input type="password" id="ipt_confirmar_senha">
                </div>
            </div>

            <div class="login-bottom">
                <button onclick="auth_register()">CRIAR CONTA</button>
            </div>
        </div>
    </div>
</body>

</html>
